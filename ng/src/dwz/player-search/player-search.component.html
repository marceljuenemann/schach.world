<ng-template #rt let-player="result" let-t="term">
	<ngb-highlight [result]="player.name" [term]="t"></ngb-highlight>
  <i>&nbsp;({{player.club.name}})</i>
</ng-template>

<!-- TODO: fix , etc. -->
<input
  id="typeahead-template"
  type="text"
  class="form-control col"
  placeholder="Nachname, Vorname"
  [(ngModel)]="model"
  [ngbTypeahead]="search"
  [resultTemplate]="rt"
  [inputFormatter]="formatter"
  [editable]="false"
/>

<hr />
<pre>Model: {{ model | json }}</pre>
