<h3 class="mt-4">Swiss-Chess Export</h3>

@for (group of this.tournament().groups.values(); track group.id) {
  @if (!group.config.hidden) {
    <div class="mt-2">
      <button (click)="download()" type="button" class="btn btn-primary">
        <span class="dashicons dashicons-download" style="vertical-align: bottom"></span>
        {{ group.id }}.json
      </button>
    </div>
  }
}
