<form>
  <!-- Name selection with DWZ database backing -->
  <ng-template #rt let-player="result" let-t="term">
    <ngb-highlight [result]="player.name" [term]="t"></ngb-highlight>
    <i>&nbsp;({{player.club}})</i>
  </ng-template>
  <div class="form-floating">
    <input
      ngbAutofocus
      id="typeahead-template"
      type="text"
      class="form-control mb-3 is-invalid"
      [formControl]="selectedPlayer"
      [ngbTypeahead]="search"
      [resultTemplate]="rt"
      [inputFormatter]="formatter"
      placeholder="Nachname, Vorname"
    />
    <label for="typeahead-template">Nachname, Vorname</label>
    <!--
    <div class="invalid-feedback">
      Please enter a message in the textarea.
    </div>
    -->
  </div>
<form [formGroup]="form">
  <div class="form-floating">
    <!-- TODO: Typeahead -->
    <input formControlName="club" id="club" type="text" class="form-control mb-3" placeholder="Verein">
    <label for="floatingInput">Verein</label>
  </div>

  <div class="row">
    @for (control of controlOptions; track control.id) {
      <div class="col-6">
        <div class="form-floating">
          <input
            [formControlName]="control.id"
            [id]="control.id"
            type="text"
            class="form-control mb-3"
            [placeholder]="control.label">
          <label [for]="control.id">{{control.label}}</label>
        </div>
      </div>
    }
  </div>
</form>

<pre>
  selectedPlayer: {{selectedPlayer.value | json}}
  form: {{form.value | json}}
</pre>
