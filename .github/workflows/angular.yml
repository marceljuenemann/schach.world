name: ng-tests

on:
  push:
    paths:
      - 'ng/**'
  pull_request:
    paths:
      - 'ng/**'

jobs:
  ng:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./ng
        
    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: './ng/package-lock.json'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build Angular app
      run: npm run build

    - name: Run tests
      run: npm test -- --browsers=ChromeHeadless --watch=false --progress=false
      
    - name: Check for uncommitted changes
      run: |
        if [[ -n $(git status --porcelain ..) ]]; then
          echo "⚠️ There are uncommitted changes after build:"
          git status --porcelain
          echo "This may indicate that generated files were modified but not committed."
          exit 1
        else
          echo "✅ Git directory is clean after build."
        fi
