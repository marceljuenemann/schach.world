name: phpunit

on:
  push:
    branches:
      - main
      - php-ci
  pull_request:
    branches:
      - main
      - php-ci

jobs:
  phpunit:
    runs-on: ubuntu-latest
    services:
      database:
        image: mysql:5.7
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: nsv-main
          MYSQL_USER: docker
          MYSQL_PASSWORD: docker
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - uses: actions/checkout@v4
      - name: Set up env file
        run: cp .github/workflows/phpunit.env .env.test.local
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress --no-scripts

      - name: Initialize database
        run: |
          for sqlfile in ./dev/dbinit/*.sql; do
            mysql -h 127.0.0.1 -P 3306 -u docker -pdocker nsv-main < "$sqlfile"
          done        
      - name: Prepare snapshot tests
        run: |
          mkdir -p tests/League/Api/Service/actual

      - name: Run tests
        run: |
          ./bin/phpunit
