name: end2end

on:
  push:
    branches:
      - php-ci
    #paths:
    #  - '**/*.php'
  pull_request:
    paths:
      - '**/*.php'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Start database
        run: |
          cd dev
          docker compose up -d nsv-database
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress
      - name: Run tests
        run: |
          docker exec -it nsv-webserver ls -lash
      - name: Stop containers
        run: |
          cd dev
          docker compose down
