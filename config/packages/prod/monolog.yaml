monolog:
    handlers:
        # Buffers all log messages and only forwards to file_log
        # if at least one warning was logged.
        filter_for_errors:
            type: fingers_crossed
            action_level: warning
            excluded_http_codes: [403, 404]
            handler: file_log

        # Logs to var/log/prod.log
        file_log:
            type: stream
            path: "%kernel.logs_dir%/%kernel.environment%.log"
