monolog:
    channels:
        # Deprecation channel used by Symfony
        - deprecation
        # Channel used by the league manager
        - league
    handlers:
        league_log:
            type: stream
            path: "%kernel.logs_dir%/league.log"
            channels: ["league"]

when@dev:
    monolog:
        handlers:
            main:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug
                channels: ["!event"]
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine", "!console"]

when@test:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                channels: ["!event"]
            nested:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug

when@prod:
    monolog:
        handlers:
            # Buffers all log messages and only forwards to file_log
            # if at least one warning was logged.
            filter_for_errors:
                type: fingers_crossed
                action_level: warning
                excluded_http_codes: [403, 404, 405]
                handler: file_log

            # Logs to var/log/prod.log
            file_log:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                channels: ["!league", "!deprecation"]
